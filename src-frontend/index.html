<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>e-voice</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --border: #2a2a2a;
        --accent: #6495ed;
        --text: #e0e0e0;
        --text-muted: #888;
        --radius: 8px;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      .badge {
        font-size: 0.7rem;
        padding: 2px 8px;
        border-radius: 100px;
        background: var(--accent);
        color: #fff;
        font-weight: 500;
      }

      main {
        flex: 1;
        display: grid;
        grid-template-columns: 220px 1fr;
        overflow: hidden;
      }

      nav {
        border-right: 1px solid var(--border);
        padding: 16px 0;
        background: var(--surface);
      }

      nav ul {
        list-style: none;
      }

      nav li a {
        display: block;
        padding: 8px 20px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 0.875rem;
        border-radius: var(--radius);
        margin: 2px 8px;
        transition: background 0.15s, color 0.15s;
      }

      nav li a:hover,
      nav li a.active {
        background: rgba(100, 149, 237, 0.12);
        color: var(--accent);
      }

      .content {
        padding: 32px;
        overflow-y: auto;
      }

      .content h2 {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 8px;
      }

      .content .subtitle {
        color: var(--text-muted);
        font-size: 0.875rem;
        margin-bottom: 32px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 16px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 20px;
      }

      .card .label {
        font-size: 0.75rem;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 8px;
      }

      .card .value {
        font-size: 1.5rem;
        font-weight: 600;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 500;
      }

      .status-pill.idle {
        background: rgba(100, 149, 237, 0.15);
        color: var(--accent);
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: currentColor;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>e-voice</h1>
      <span class="badge">v0.1.0</span>
    </header>
    <main>
      <nav>
        <ul>
          <li><a href="#" class="active">Dashboard</a></li>
          <li><a href="#">Settings</a></li>
          <li><a href="#">Doctor</a></li>
        </ul>
      </nav>
      <div class="content" id="app">
        <h2>Dashboard</h2>
        <p class="subtitle">LLM-powered dictation post-processor</p>

        <div class="card-grid">
          <div class="card">
            <div class="label">Status</div>
            <div class="value">
              <span class="status-pill idle"><span class="dot"></span>Idle</span>
            </div>
          </div>
          <div class="card">
            <div class="label">Requests</div>
            <div class="value" id="req-count">—</div>
          </div>
          <div class="card">
            <div class="label">Model</div>
            <div class="value" id="model-name">—</div>
          </div>
        </div>
      </div>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
